  <g transform="translate(280,210)">
    <rect width="80" height="80" rx="12" fill="#fff"/>
    <!-- Gear: center circle + outer teeth as small rects rotated -->
    <circle cx="40" cy="40" r="11" fill="#1a3d2f"/>
    <circle cx="40" cy="40" r="6" fill="#fff"/>
    <circle cx="40" cy="40" r="6" fill="#c8732e" opacity="0.5"/>
    <!-- Teeth: 8 positions -->
    <g fill="#1a3d2f">
      <rect x="36" y="16" width="8" height="12" rx="3"/>
      <rect x="36" y="52" width="8" height="12" rx="3"/>
      <rect x="16" y="36" width="12" height="8" rx="3"/>
      <rect x="52" y="36" width="12" height="8" rx="3"/>
      <rect transform="rotate(45,40,40)" x="36" y="16" width="8" height="12" rx="3"/>
      <rect transform="rotate(45,40,40)" x="36" y="52" width="8" height="12" rx="3"/>
      <rect transform="rotate(45,40,40)" x="16" y="36" width="12" height="8" rx="3"/>
      <rect transform="rotate(45,40,40)" x="52" y="36" width="12" height="8" rx="3"/>
    </g>
  </g>

