    <rect x="14" y="20" width="52" height="46" rx="5" fill="#1a3d2f" opacity="0.08"/>
    <rect x="14" y="20" width="52" height="46" rx="5" fill="none" stroke="#1a3d2f" stroke-width="4"/>
    <rect x="14" y="20" width="52" height="16" rx="5" fill="#1a3d2f"/>
    <rect x="14" y="30" width="52" height="6" fill="#1a3d2f"/>
    <rect x="24" y="14" width="4" height="12" rx="2" fill="#c8732e"/>
    <rect x="52" y="14" width="4" height="12" rx="2" fill="#c8732e"/>
