    <circle cx="34" cy="34" r="16" fill="none" stroke="#1a3d2f" stroke-width="6"/>
    <circle cx="34" cy="34" r="10" fill="#c8732e" opacity="0.2"/>
    <line x1="46" y1="46" x2="62" y2="62" stroke="#1a3d2f" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- 8: Bookmark -->
  <g transform="translate(170,210)">
    <rect width="80" height="80" rx="12" fill="#fff"/>
    <path d="M 26,14 L 54,14 L 54,66 L 40,54 L 26,66 Z" fill="#1a3d2f"/>
    <path d="M 26,14 L 54,14 L 54,40 L 26,40 Z" fill="#c8732e" opacity="0.3"/>
