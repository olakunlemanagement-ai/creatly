    <path d="M 26,38 Q 26,18 40,18 Q 54,18 54,38" fill="none" stroke="#1a3d2f" stroke-width="6"/>
    <circle cx="40" cy="54" r="6" fill="#c8732e"/>
    <rect x="37" y="54" width="6" height="10" rx="2" fill="#c8732e"/>
