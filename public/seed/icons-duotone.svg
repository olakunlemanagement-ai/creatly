    <circle cx="58" cy="24" r="9" fill="#1a3d2f"/>
    <circle cx="22" cy="40" r="9" fill="#1a3d2f" opacity="0.6"/>
    <circle cx="58" cy="56" r="9" fill="#c8732e"/>
    <line x1="30" y1="36" x2="50" y2="28" stroke="#1a3d2f" stroke-width="3" opacity="0.6"/>
    <line x1="30" y1="44" x2="50" y2="52" stroke="#c8732e" stroke-width="3" opacity="0.7"/>
