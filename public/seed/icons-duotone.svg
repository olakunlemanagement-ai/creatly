    <circle cx="54" cy="52" r="3" fill="#c8732e"/>
    <circle cx="26" cy="62" r="3" fill="#1a3d2f" opacity="0.3"/>
    <circle cx="40" cy="62" r="3" fill="#1a3d2f" opacity="0.3"/>
