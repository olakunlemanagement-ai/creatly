  <!-- 24: Palette -->
  <g transform="translate(610,430)">
    <rect width="80" height="80" rx="12" fill="#fff"/>
    <circle cx="40" cy="40" r="24" fill="none" stroke="#1a3d2f" stroke-width="4"/>
    <circle cx="40" cy="40" r="24" fill="#1a3d2f" opacity="0.06"/>
    <circle cx="40" cy="18" r="6" fill="#1a3d2f"/>
    <circle cx="62" cy="30" r="6" fill="#c8732e"/>
    <circle cx="62" cy="50" r="6" fill="#2d5a44"/>
    <circle cx="40" cy="62" r="6" fill="#e8dcc8" stroke="#ccc" stroke-width="1"/>
    <circle cx="18" cy="50" r="6" fill="#c8732e" opacity="0.5"/>
    <circle cx="18" cy="30" r="6" fill="#1a3d2f" opacity="0.5"/>
    <circle cx="40" cy="40" r="8" fill="#fff"/>
    <circle cx="40" cy="40" r="5" fill="#1a3d2f" opacity="0.15"/>
