    <line x1="40" y1="14" x2="40" y2="50" stroke="#1a3d2f" stroke-width="5" stroke-linecap="round"/>
    <polyline points="24,38 40,54 56,38" fill="none" stroke="#1a3d2f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="14" y="58" width="52" height="8" rx="4" fill="#c8732e"/>
