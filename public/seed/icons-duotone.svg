    <path d="M 52,14 Q 60,14 62,22 L 34,56 L 20,60 L 24,46 Z" fill="#1a3d2f"/>
    <path d="M 52,14 Q 60,14 62,22 L 46,38 L 38,30 Z" fill="#c8732e" opacity="0.6"/>
    <line x1="20" y1="66" x2="64" y2="66" stroke="#1a3d2f" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- 23: Image / photo -->
  <g transform="translate(500,430)">
    <rect width="80" height="80" rx="12" fill="#fff"/>
    <rect x="12" y="18" width="56" height="44" rx="5" fill="none" stroke="#1a3d2f" stroke-width="4"/>
    <circle cx="28" cy="30" r="7" fill="#c8732e" opacity="0.6"/>
    <polygon points="12,62 30,38 44,52 56,40 68,62" fill="#1a3d2f" opacity="0.3"/>
    <polygon points="12,62 30,38 44,52 56,40 68,62" fill="#1a3d2f" opacity="0.5"/>
