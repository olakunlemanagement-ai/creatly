    <rect x="14" y="42" width="12" height="24" rx="3" fill="#1a3d2f" opacity="0.4"/>
    <rect x="30" y="28" width="12" height="38" rx="3" fill="#1a3d2f" opacity="0.7"/>
    <rect x="46" y="18" width="12" height="48" rx="3" fill="#1a3d2f"/>
