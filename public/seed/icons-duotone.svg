  <!-- Row 4 -->
  <!-- 19: Upload -->
  <g transform="translate(60,430)">
    <rect width="80" height="80" rx="12" fill="#fff"/>
    <line x1="40" y1="54" x2="40" y2="18" stroke="#1a3d2f" stroke-width="5" stroke-linecap="round"/>
    <polyline points="24,30 40,14 56,30" fill="none" stroke="#1a3d2f" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
