    <rect x="26" y="18" width="28" height="42" rx="3" fill="#fff" opacity="0.15"/>
    <rect x="30" y="22" width="20" height="30" rx="2" fill="#c8732e" opacity="0.25"/>
    <circle cx="40" cy="64" r="3" fill="#e8dcc8" opacity="0.6"/>
