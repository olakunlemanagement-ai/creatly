  <!-- 16: Layers -->
  <g transform="translate(390,320)">
    <rect width="80" height="80" rx="12" fill="#fff"/>
    <polygon points="40,16 66,30 40,44 14,30" fill="#c8732e" opacity="0.35"/>
    <polygon points="40,27 66,41 40,55 14,41" fill="#1a3d2f" opacity="0.5"/>
    <polygon points="40,38 66,52 40,66 14,52" fill="#1a3d2f"/>
    <polygon points="40,38 66,52 40,66 14,52" fill="#c8732e" opacity="0.2"/>
