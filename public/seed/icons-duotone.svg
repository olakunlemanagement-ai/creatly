    <polyline points="12,28 40,48 68,28" fill="none" stroke="#1a3d2f" stroke-width="4" stroke-linejoin="round"/>
    <polyline points="12,28 40,48 68,28" fill="none" stroke="#c8732e" stroke-width="2.5" opacity="0.6"/>
