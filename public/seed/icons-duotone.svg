<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8f4ec"/>
      <stop offset="100%" stop-color="#f0ebe0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Header -->
  <rect width="800" height="72" fill="#1a3d2f"/>
  <text x="36" y="30" font-family="system-ui,sans-serif" font-weight="300" font-size="10" fill="#e8dcc8" opacity="0.6" letter-spacing="4">ICON LIBRARY</text>
  <text x="36" y="56" font-family="Georgia,serif" font-weight="700" font-size="26" fill="#e8dcc8">Duotone Pack</text>
  <text x="700" y="38" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#c8732e" letter-spacing="2">240 ICONS</text>
  <text x="700" y="56" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#e8dcc8" opacity="0.5" letter-spacing="2">20 CATEGORIES</text>

  <!-- ── Icon grid: 6 columns × 4 rows, each icon in an 80×80 cell ── -->
  <!-- Cell starts at x=60, y=100 with 110px col spacing, 110px row spacing -->

  <!-- Row 1 -->
  <!-- 1: Home icon -->
  <g transform="translate(60,100)">
    <rect width="80" height="80" rx="12" fill="#fff"/>
    <!-- House shape: roof (triangle-ish) + body -->
    <polygon points="40,18 62,38 62,62 18,62 18,38" fill="#1a3d2f" opacity="0.15"/>
    <polygon points="40,18 62,38 18,38" fill="#1a3d2f"/>
    <rect x="24" y="38" width="32" height="24" fill="#1a3d2f" opacity="0.8"/>
    <rect x="33" y="48" width="14" height="14" rx="2" fill="#c8732e"/>
    <rect x="28" y="14" width="8" height="14" fill="#c8732e" opacity="0.7"/>
  </g>

  <!-- 2: User / person -->
  <g transform="translate(170,100)">
    <rect width="80" height="80" rx="12" fill="#fff"/>
    <circle cx="40" cy="28" r="13" fill="#1a3d2f"/>
    <circle cx="40" cy="28" r="8" fill="#c8732e" opacity="0.6"/>
    <path d="M 16,68 Q 16,46 40,46 Q 64,46 64,68 Z" fill="#1a3d2f" opacity="0.85"/>
    <path d="M 22,68 Q 22,52 40,52 Q 58,52 58,68 Z" fill="#c8732e" opacity="0.3"/>
  </g>

  <!-- 3: Heart -->
  <g transform="translate(280,100)">
    <rect width="80" height="80" rx="12" fill="#fff"/>
    <path d="M 40,60 Q 14,44 14,30 Q 14,18 26,18 Q 33,18 40,26 Q 47,18 54,18 Q 66,18 66,30 Q 66,44 40,60 Z" fill="#1a3d2f"/>
    <path d="M 40,54 Q 20,42 20,30 Q 20,24 26,24 Q 33,24 40,32" fill="#c8732e" opacity="0.55"/>
  </g>

  <!-- 4: Star -->
  <g transform="translate(390,100)">
    <rect width="80" height="80" rx="12" fill="#fff"/>
    <polygon points="40,14 46,32 66,32 50,44 56,62 40,50 24,62 30,44 14,32 34,32" fill="#1a3d2f"/>
    <polygon points="40,14 46,32 52,32 40,24 28,32 34,32" fill="#c8732e" opacity="0.7"/>
  </g>

  <!-- 5: Bell -->
  <g transform="translate(500,100)">
    <rect width="80" height="80" rx="12" fill="#fff"/>
    <!-- Bell body -->
    <path d="M 40,16 Q 60,16 62,36 L 64,58 L 16,58 L 18,36 Q 20,16 40,16 Z" fill="#1a3d2f"/>
    <path d="M 40,16 Q 54,16 56,36 L 58,52 L 22,52" fill="#c8732e" opacity="0.25"/>
    <!-- Bell top -->
    <rect x="34" y="12" width="12" height="8" rx="4" fill="#1a3d2f" opacity="0.7"/>
    <!-- Bell bottom clapper -->
    <rect x="30" y="58" width="20" height="6" rx="3" fill="#1a3d2f" opacity="0.5"/>
    <circle cx="40" cy="66" r="5" fill="#c8732e"/>
