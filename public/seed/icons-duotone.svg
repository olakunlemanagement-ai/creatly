    <rect x="14" y="14" width="22" height="22" rx="4" fill="#1a3d2f"/>
    <rect x="44" y="14" width="22" height="22" rx="4" fill="#1a3d2f" opacity="0.5"/>
    <rect x="14" y="44" width="22" height="22" rx="4" fill="#1a3d2f" opacity="0.5"/>
    <rect x="44" y="44" width="22" height="22" rx="4" fill="#c8732e"/>
