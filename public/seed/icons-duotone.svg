    <rect x="12" y="26" width="56" height="38" rx="6" fill="#1a3d2f"/>
    <circle cx="40" cy="45" r="12" fill="#1a3d2f" opacity="0.0" stroke="#fff" stroke-width="3"/>
    <circle cx="40" cy="45" r="12" fill="#c8732e" opacity="0.4"/>
    <circle cx="40" cy="45" r="7" fill="#fff" opacity="0.2"/>
    <rect x="28" y="18" width="24" height="12" rx="4" fill="#1a3d2f" opacity="0.7"/>
    <circle cx="60" cy="34" r="4" fill="#c8732e" opacity="0.8"/>
