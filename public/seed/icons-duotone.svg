  <!-- Footer bar -->
  <rect y="528" width="800" height="72" fill="#1a3d2f" opacity="0.04"/>
  <line x1="0" y1="528" x2="800" y2="528" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="556" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#aaa" letter-spacing="2">SVG · PNG · 16px · 24px · 32px · 48px · 64px · DUOTONE + OUTLINE + FILLED VARIANTS</text>
  <text x="400" y="578" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="#1a3d2f" opacity="0.5" letter-spacing="2">240 ICONS ACROSS 20 CATEGORIES</text>
</svg>
