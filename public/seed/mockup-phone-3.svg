<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a3d2f"/>
      <stop offset="100%" stop-color="#0a1e14"/>
    </radialGradient>
    <radialGradient id="spotlight" cx="45%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#2d5a44" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0a1e14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floor" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8732e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c8732e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chassis-dark" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#2e2e2e"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000" flood-opacity="0.5"/>
      <feDropShadow dx="0" dy="0" stdDeviation="40" flood-color="#c8732e" flood-opacity="0.06"/>
    </filter>
    <clipPath id="sc">
      <rect x="296" y="94" width="208" height="424" rx="6"/>
    </clipPath>
  </defs>

  <!-- Dark studio background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#spotlight)"/>

  <!-- Terracotta floor glow -->
  <ellipse cx="400" cy="548" rx="180" ry="30" fill="url(#floor)"/>

  <!-- Subtle dot texture -->
  <pattern id="dot-p" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="1" fill="#e8dcc8" opacity="0.03"/>
  </pattern>
  <rect width="800" height="600" fill="url(#dot-p)"/>

  <!-- Phone -->
  <g filter="url(#sh)">
    <rect x="280" y="72" width="240" height="476" rx="36" fill="url(#chassis-dark)"/>
    <rect x="288" y="80" width="224" height="460" rx="28" fill="#080808"/>
    <rect x="296" y="88" width="208" height="436" rx="20" fill="#0d1a12"/>
  </g>

  <!-- Side buttons -->
  <rect x="518" y="196" width="5" height="32" rx="2.5" fill="#333"/>
  <rect x="518" y="234" width="5" height="32" rx="2.5" fill="#333"/>
  <rect x="277" y="190" width="5" height="26" rx="2.5" fill="#333"/>
  <rect x="277" y="222" width="5" height="26" rx="2.5" fill="#333"/>

  <!-- Screen: dark mode UI -->
  <g clip-path="url(#sc)">
    <rect x="296" y="88" width="208" height="436" fill="#0a1e14"/>

    <!-- Status bar -->
    <rect x="296" y="88" width="208" height="30" fill="#0a1e14"/>
    <text x="312" y="107" font-family="system-ui,sans-serif" font-weight="600" font-size="10" fill="#e8dcc8" opacity="0.8">9:41</text>
    <rect x="456" y="97" width="20" height="8" rx="2" fill="#e8dcc8" opacity="0.4"/>

    <!-- Dynamic island -->
    <rect x="372" y="96" width="56" height="16" rx="8" fill="#0a0a0a"/>

    <!-- Dark mode header -->
    <rect x="296" y="118" width="208" height="48" fill="#0f2219"/>
    <text x="400" y="142" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="16" fill="#e8dcc8">Creatly</text>
    <text x="400" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#e8dcc8" opacity="0.4" letter-spacing="2">DARK MODE</text>

    <!-- Search bar dark -->
    <rect x="308" y="176" width="184" height="26" rx="13" fill="#1a3d2f"/>
    <text x="326" y="193" font-family="system-ui,sans-serif" font-size="9" fill="#e8dcc8" opacity="0.4">🔍 Search…</text>

    <!-- Featured card (large) -->
    <rect x="308" y="212" width="184" height="120" rx="10" fill="#1a3d2f"/>
    <!-- Terracotta accent on featured card -->
    <rect x="308" y="212" width="184" height="6" rx="3" fill="#c8732e"/>
    <!-- Stars/sparkle effect -->
    <circle cx="440" cy="250" r="28" fill="#c8732e" opacity="0.1"/>
    <circle cx="440" cy="250" r="16" fill="#c8732e" opacity="0.12"/>
    <text x="340" y="250" font-family="system-ui,sans-serif" font-size="9" fill="#e8dcc8" opacity="0.5" letter-spacing="2">FEATURED</text>
    <text x="340" y="268" font-family="Georgia,serif" font-weight="700" font-size="14" fill="#e8dcc8">Afrobeat Kit</text>
    <text x="340" y="284" font-family="system-ui,sans-serif" font-size="7" fill="#c8732e">Brand Identity</text>
    <rect x="340" y="296" width="56" height="18" rx="9" fill="#c8732e"/>
    <text x="368" y="309" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#fff" font-weight="600">Get Now →</text>

    <!-- Small cards row -->
    <rect x="308" y="342" width="86" height="70" rx="8" fill="#142b20"/>
    <rect x="308" y="342" width="86" height="42" rx="8" fill="#1a3d2f"/>
    <text x="351" y="368" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="16" fill="#e8dcc8" opacity="0.7">Aa</text>
    <text x="312" y="402" font-family="system-ui,sans-serif" font-size="7" fill="#e8dcc8" opacity="0.7">Lagos Font</text>
    <text x="312" y="412" font-family="system-ui,sans-serif" font-size="6" fill="#e8dcc8" opacity="0.3">Typeface</text>

    <rect x="402" y="342" width="90" height="70" rx="8" fill="#142b20"/>
    <rect x="402" y="342" width="90" height="42" rx="8" fill="#c8732e" opacity="0.25"/>
    <!-- Mini icon grid -->
    <circle cx="426" cy="358" r="7" fill="#c8732e" opacity="0.5"/>
    <circle cx="448" cy="358" r="7" fill="#1a3d2f"/>
    <circle cx="470" cy="358" r="7" fill="#c8732e" opacity="0.4"/>
    <circle cx="426" cy="374" r="7" fill="#1a3d2f"/>
    <circle cx="448" cy="374" r="7" fill="#c8732e" opacity="0.5"/>
    <circle cx="470" cy="374" r="7" fill="#1a3d2f"/>
    <text x="406" y="402" font-family="system-ui,sans-serif" font-size="7" fill="#e8dcc8" opacity="0.7">Icon Pack</text>
    <text x="406" y="412" font-family="system-ui,sans-serif" font-size="6" fill="#e8dcc8" opacity="0.3">240 Icons</text>

    <!-- Downloads section -->
    <rect x="308" y="422" width="184" height="30" rx="6" fill="#142b20"/>
    <text x="316" y="440" font-family="system-ui,sans-serif" font-size="8" fill="#e8dcc8" opacity="0.5">Recent Downloads</text>
    <text x="484" y="440" text-anchor="end" font-family="system-ui,sans-serif" font-size="7" fill="#c8732e">See all →</text>

    <!-- Bottom nav dark -->
    <rect x="296" y="458" width="208" height="52" fill="#0a1e14"/>
    <line x1="296" y1="458" x2="504" y2="458" stroke="#1a3d2f" stroke-width="1"/>
    <text x="328" y="482" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#c8732e">⊞</text>
    <text x="374" y="482" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#e8dcc8" opacity="0.3">⌕</text>
    <text x="428" y="482" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#e8dcc8" opacity="0.3">♡</text>
    <text x="474" y="482" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" fill="#e8dcc8" opacity="0.3">☰</text>
    <rect x="354" y="506" width="92" height="4" rx="2" fill="#e8dcc8" opacity="0.15"/>
  </g>

  <!-- Subtle screen edge glow -->
  <rect x="296" y="88" width="208" height="436" rx="20" fill="none" stroke="#c8732e" stroke-width="1" opacity="0.08"/>

  <!-- Label -->
  <text x="400" y="574" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#e8dcc8" opacity="0.2" letter-spacing="3">DARK COLORWAY  ·  DARK MODE UI  ·  STUDIO ANGLE 3</text>
</svg>
