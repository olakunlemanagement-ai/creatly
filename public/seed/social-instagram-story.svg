<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1e14"/>
      <stop offset="100%" stop-color="#1a3d2f"/>
    </linearGradient>
    <linearGradient id="s1g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8732e"/>
      <stop offset="100%" stop-color="#7a3d10"/>
    </linearGradient>
    <linearGradient id="s2g" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#1a3d2f"/>
      <stop offset="100%" stop-color="#0d2219"/>
    </linearGradient>
    <linearGradient id="s3g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e0d5c0"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Canvas background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Subtle dot grid on bg -->
  <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="800" height="600" fill="url(#dots)"/>

  <!-- ── FRAME 1 (left, tilted -5°, terracotta) ── -->
  <g transform="translate(108,118) rotate(-5,84,166)" filter="url(#sh)">
    <rect width="168" height="332" rx="14" fill="url(#s1g)"/>
    <!-- Progress bars -->
    <rect x="12" y="10" width="30" height="3" rx="1.5" fill="#fff" opacity="0.8"/>
    <rect x="46" y="10" width="30" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
    <rect x="80" y="10" width="30" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
    <rect x="114" y="10" width="30" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
    <!-- Big hollow circle motif -->
    <circle cx="84" cy="118" r="74" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.15"/>
    <circle cx="84" cy="118" r="50" fill="none" stroke="#e8dcc8" stroke-width="1" opacity="0.25"/>
    <circle cx="84" cy="118" r="28" fill="#fff" opacity="0.07"/>
    <!-- "NEW" pill -->
    <rect x="54" y="88" width="60" height="20" rx="10" fill="#fff" opacity="0.15"/>
    <text x="84" y="102" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="10" fill="#fff" letter-spacing="2">N E W</text>
    <!-- Big headline -->
    <text x="84" y="160" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="30" fill="#fff">BOLD</text>
    <text x="84" y="186" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="13" fill="#e8dcc8" letter-spacing="6">ARRIVALS</text>
    <!-- Divider -->
    <rect x="24" y="202" width="120" height="1" fill="#fff" opacity="0.25"/>
    <!-- Body text sims -->
    <rect x="34" y="216" width="90" height="7" rx="3" fill="#fff" opacity="0.2"/>
    <rect x="44" y="229" width="70" height="7" rx="3" fill="#fff" opacity="0.15"/>
    <!-- CTA button -->
    <rect x="28" y="254" width="112" height="30" rx="15" fill="#fff" opacity="0.15"/>
    <rect x="29" y="255" width="110" height="28" rx="14" fill="none" stroke="#fff" stroke-width="1" opacity="0.4"/>
    <text x="84" y="274" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="11" fill="#fff">Shop Now  →</text>
    <!-- Home indicator bar -->
    <rect x="56" y="318" width="56" height="4" rx="2" fill="#fff" opacity="0.25"/>
  </g>

  <!-- ── FRAME 2 (center, featured, dark green) ── -->
  <g transform="translate(306,80)" filter="url(#sh)">
    <rect width="188" height="372" rx="16" fill="url(#s2g)"/>
    <!-- Diagonal terracotta accent -->
    <polygon points="0,120 188,220 188,270 0,170" fill="#c8732e" opacity="0.12"/>
    <!-- Progress bars -->
    <rect x="14" y="12" width="34" height="3" rx="1.5" fill="#fff" opacity="0.7"/>
    <rect x="52" y="12" width="34" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
    <rect x="90" y="12" width="34" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
    <rect x="128" y="12" width="34" height="3" rx="1.5" fill="#fff" opacity="0.3"/>
    <!-- Avatar circle -->
    <circle cx="30" cy="34" r="12" fill="none" stroke="#e8dcc8" stroke-width="1.5" opacity="0.5"/>
    <text x="57" y="31" font-family="system-ui,sans-serif" font-weight="600" font-size="9" fill="#e8dcc8" opacity="0.7">creatly_studio</text>
    <text x="57" y="42" font-family="system-ui,sans-serif" font-weight="400" font-size="8" fill="#e8dcc8" opacity="0.4">4h ago · Follow</text>
    <!-- Large circle motif -->
    <circle cx="94" cy="160" r="85" fill="none" stroke="#e8dcc8" stroke-width="1" opacity="0.08"/>
    <circle cx="94" cy="160" r="60" fill="#c8732e" opacity="0.12"/>
    <circle cx="94" cy="160" r="38" fill="#c8732e" opacity="0.18"/>
    <!-- Main text -->
    <text x="94" y="136" text-anchor="middle" font-family="Georgia,serif" font-size="11" fill="#e8dcc8" letter-spacing="4" opacity="0.7">S U M M E R</text>
    <text x="94" y="172" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="900" font-size="44" fill="#fff" letter-spacing="-2">2024</text>
    <text x="94" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#c8732e" letter-spacing="5">COLLECTION</text>
    <!-- Caption card -->
    <rect x="0" y="272" width="188" height="100" fill="#fff" opacity="0.04"/>
    <rect x="0" y="272" width="188" height="1" fill="#fff" opacity="0.08"/>
    <text x="20" y="298" font-family="system-ui,sans-serif" font-weight="800" font-size="18" fill="#fff">New Arrivals</text>
    <text x="20" y="316" font-family="system-ui,sans-serif" font-size="10" fill="#e8dcc8" opacity="0.6">Shop the latest collection →</text>
    <!-- CTA pill -->
    <rect x="20" y="328" width="96" height="26" rx="13" fill="#c8732e"/>
    <text x="68" y="345" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="10" fill="#fff">Explore Now</text>
    <!-- Home bar -->
    <rect x="67" y="360" width="54" height="4" rx="2" fill="#fff" opacity="0.2"/>
  </g>

  <!-- ── FRAME 3 (right, tilted +4°, cream) ── -->
  <g transform="translate(524,122) rotate(4,84,166)" filter="url(#sh)">
    <rect width="168" height="332" rx="14" fill="url(#s3g)"/>
    <!-- Green accent strip left -->
    <rect x="0" y="0" width="6" height="332" rx="3" fill="#1a3d2f" opacity="0.5"/>
    <!-- Progress bars dark -->
    <rect x="14" y="10" width="26" height="3" rx="1.5" fill="#1a3d2f" opacity="0.35"/>
    <rect x="44" y="10" width="26" height="3" rx="1.5" fill="#1a3d2f" opacity="0.2"/>
    <rect x="74" y="10" width="26" height="3" rx="1.5" fill="#1a3d2f" opacity="0.2"/>
    <rect x="104" y="10" width="26" height="3" rx="1.5" fill="#1a3d2f" opacity="0.2"/>
    <!-- Big display number -->
    <text x="84" y="96" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="64" fill="#1a3d2f" opacity="0.08">25</text>
    <!-- Actual headline content -->
    <text x="20" y="100" font-family="system-ui,sans-serif" font-weight="900" font-size="11" fill="#1a3d2f" letter-spacing="3">SAVE THE</text>
    <text x="20" y="122" font-family="Georgia,serif" font-weight="700" font-size="28" fill="#1a3d2f">Date</text>
    <rect x="20" y="134" width="80" height="2" fill="#c8732e"/>
    <!-- Event details -->
    <text x="20" y="154" font-family="system-ui,sans-serif" font-size="10" fill="#1a3d2f" opacity="0.6">Saturday, Oct 12</text>
    <text x="20" y="168" font-family="system-ui,sans-serif" font-size="10" fill="#1a3d2f" opacity="0.6">Lagos, Nigeria · 6 PM</text>
    <!-- Body text sims -->
    <rect x="20" y="188" width="112" height="6" rx="3" fill="#1a3d2f" opacity="0.12"/>
    <rect x="20" y="200" width="96" height="6" rx="3" fill="#1a3d2f" opacity="0.09"/>
    <rect x="20" y="212" width="72" height="6" rx="3" fill="#1a3d2f" opacity="0.07"/>
    <!-- Terracotta circle accent -->
    <circle cx="136" cy="84" r="36" fill="#c8732e" opacity="0.12"/>
    <circle cx="136" cy="84" r="22" fill="#c8732e" opacity="0.15"/>
    <!-- RSVP button -->
    <rect x="20" y="238" width="90" height="28" rx="14" fill="#1a3d2f"/>
    <text x="65" y="256" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="10" fill="#e8dcc8">RSVP Now</text>
    <!-- Bottom handle -->
    <rect x="52" y="320" width="64" height="4" rx="2" fill="#1a3d2f" opacity="0.2"/>
  </g>

  <!-- Label strip at bottom -->
  <text x="400" y="556" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="500" font-size="11" fill="#e8dcc8" opacity="0.4" letter-spacing="4">INSTAGRAM STORY PACK  ·  30 TEMPLATES  ·  9:16 FORMAT</text>
</svg>
