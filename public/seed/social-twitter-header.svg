<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3d2f"/>
      <stop offset="60%" stop-color="#2d5a44"/>
      <stop offset="100%" stop-color="#c8732e"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafaf8"/>
      <stop offset="100%" stop-color="#f0eee9"/>
    </linearGradient>
    <filter id="card-sh">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Page background -->
  <rect width="800" height="600" fill="#e8e6e0"/>

  <!-- ── Twitter/X Profile Card ── -->
  <g filter="url(#card-sh)">
    <rect x="80" y="60" width="640" height="470" rx="16" fill="url(#card-bg)"/>
  </g>

  <!-- ── Header banner (top of card) ── -->
  <clipPath id="banner-clip">
    <rect x="80" y="60" width="640" height="200" rx="16"/>
  </clipPath>
  <g clip-path="url(#banner-clip)">
    <rect x="80" y="60" width="640" height="200" fill="url(#hdr)"/>

    <!-- Geometric diamond grid pattern -->
    <g opacity="0.12" stroke="#fff" stroke-width="1" fill="none">
      <polygon points="200,60 280,130 200,200 120,130"/>
      <polygon points="280,60 360,130 280,200 200,130"/>
      <polygon points="360,60 440,130 360,200 280,130"/>
      <polygon points="440,60 520,130 440,200 360,130"/>
      <polygon points="520,60 600,130 520,200 440,130"/>
      <polygon points="600,60 680,130 600,200 520,130"/>
      <polygon points="680,60 720,110 680,160 640,110"/>
    </g>

    <!-- Terracotta circle accents -->
    <circle cx="590" cy="100" r="70" fill="#c8732e" opacity="0.15"/>
    <circle cx="590" cy="100" r="44" fill="#c8732e" opacity="0.18"/>

    <!-- Large text on banner -->
    <text x="120" y="128" font-family="Georgia,serif" font-weight="700" font-size="36" fill="#fff" opacity="0.95">Creative Studio</text>
    <text x="120" y="156" font-family="system-ui,sans-serif" font-size="13" fill="#e8dcc8" opacity="0.75">Templates · Graphics · Fonts · Mockups</text>

    <!-- Small "HEADER TEMPLATE" label -->
    <rect x="534" y="168" width="148" height="24" rx="12" fill="#fff" opacity="0.15"/>
    <text x="608" y="184" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="10" fill="#fff" letter-spacing="1">HEADER TEMPLATE</text>
  </g>

  <!-- ── Profile section ── -->
  <!-- Avatar circle (overlaps banner) -->
  <circle cx="148" cy="258" r="54" fill="#fff"/>
  <circle cx="148" cy="258" r="46" fill="#1a3d2f"/>
  <text x="148" y="266" text-anchor="middle" font-family="Georgia,serif" font-weight="700" font-size="28" fill="#e8dcc8">CS</text>

  <!-- Edit profile button -->
  <rect x="576" y="278" width="120" height="34" rx="17" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="636" y="299" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="600" font-size="13" fill="#1a1a1a">Edit profile</text>

  <!-- Profile name + handle -->
  <text x="120" y="338" font-family="system-ui,sans-serif" font-weight="800" font-size="20" fill="#1a1a1a">Creative Studio ✓</text>
  <text x="120" y="358" font-family="system-ui,sans-serif" font-size="14" fill="#666">@creativestudio_ng</text>

  <!-- Bio text -->
  <text x="120" y="386" font-family="system-ui,sans-serif" font-size="14" fill="#333">Templates &amp; graphics for African creatives. Powered by</text>
  <text x="120" y="404" font-family="system-ui,sans-serif" font-size="14" fill="#333">Creatly — unlimited downloads with one subscription.</text>

  <!-- Location + link -->
  <text x="120" y="430" font-family="system-ui,sans-serif" font-size="13" fill="#666">📍 Lagos, Nigeria  ·  🔗 joincreatly.com</text>

  <!-- Stats row -->
  <text x="120" y="460" font-family="system-ui,sans-serif" font-weight="700" font-size="15" fill="#1a1a1a">4,820 </text>
  <text x="176" y="460" font-family="system-ui,sans-serif" font-size="15" fill="#666">Following   </text>
  <text x="274" y="460" font-family="system-ui,sans-serif" font-weight="700" font-size="15" fill="#1a1a1a">28.4K </text>
  <text x="330" y="460" font-family="system-ui,sans-serif" font-size="15" fill="#666">Followers</text>

  <!-- Nav tabs -->
  <line x1="80" y1="496" x2="720" y2="496" stroke="#e0ddd8" stroke-width="1"/>
  <text x="174" y="490" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="700" font-size="14" fill="#1a1a1a">Posts</text>
  <rect x="147" y="493" width="54" height="3" rx="1.5" fill="#1a3d2f"/>
  <text x="330" y="490" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#999">Replies</text>
  <text x="480" y="490" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#999">Media</text>
  <text x="628" y="490" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#999">Likes</text>

  <!-- Bottom label -->
  <text x="400" y="562" text-anchor="middle" font-family="system-ui,sans-serif" font-weight="500" font-size="11" fill="#888" letter-spacing="3">TWITTER / X HEADER COLLECTION  ·  10 DESIGNS  ·  1500 × 500 px</text>
</svg>
